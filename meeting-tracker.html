<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Othram — Gov Coordination</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#000;--surface:#0d0d0d;--surface2:#141414;--border:#222;--border2:#2a2a2a;--purple:#cc44ff;--purple-br:#dd66ff;--purple-dim:#8800cc;--purple-glow:rgba(204,68,255,0.10);--white:#fff;--text:#ccc;--muted:#666;--danger:#ff4d4d;--warn:#ffaa33;--green:#33cc77;--mono:'DM Mono',monospace;--sans:'Inter',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;font-size:14px}
header{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-name{font-weight:800;font-size:17px;color:var(--white);letter-spacing:.05em}
.logo-sub{font-size:9px;color:var(--purple);letter-spacing:.18em;text-transform:uppercase;font-family:var(--mono);margin-top:2px}
.year-badge{font-family:var(--mono);font-size:11px;color:var(--purple);border:1px solid var(--purple-dim);padding:4px 12px;border-radius:3px;background:var(--purple-glow)}
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg);padding:0 28px;overflow-x:auto}
.tab{padding:13px 22px;cursor:pointer;font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.tab:hover{color:var(--white)}.tab.active{color:var(--purple);border-bottom-color:var(--purple)}
main{padding:28px;max-width:1100px;margin:0 auto}
.panel{display:none}.panel.active{display:block}
.section-label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--purple);font-family:var(--mono);margin-bottom:16px;display:flex;align-items:center;gap:10px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.stats-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:28px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px 20px;flex:1;min-width:100px}
.stat-num{font-size:30px;font-weight:800;color:var(--white);font-family:var(--mono);line-height:1}
.stat-num.purple{color:var(--purple)}.stat-num.orange{color:var(--warn)}.stat-num.green{color:var(--green)}
.stat-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:5px}

/* ADD BOX */
.add-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:24px}
.form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.form-row:last-child{margin-bottom:0}
input,textarea,select{background:var(--bg);border:1px solid var(--border2);color:var(--white);padding:9px 12px;border-radius:5px;font-family:var(--sans);font-size:13px;outline:none;transition:border-color .2s}
input:focus,textarea:focus,select:focus{border-color:var(--purple)}
input::placeholder,textarea::placeholder{color:var(--muted)}
textarea{resize:vertical;min-height:80px}
select option{background:#111}
.f1{flex:1;min-width:140px}.f2{flex:2;min-width:200px}.fxs{width:140px}
.btn{padding:9px 18px;border-radius:5px;font-family:var(--sans);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border:none;transition:all .2s;white-space:nowrap}
.btn-primary{background:var(--purple);color:#000}.btn-primary:hover{background:var(--purple-br)}
.btn-outline{background:transparent;color:var(--purple);border:1px solid var(--purple-dim)}.btn-outline:hover{background:var(--purple-glow)}
.btn-del{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:15px;line-height:1;padding:2px 6px;border-radius:3px;transition:color .15s}.btn-del:hover{color:var(--danger)}

/* FILTERS */
.filters{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.f-btn{padding:5px 14px;border-radius:20px;cursor:pointer;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .2s}
.f-btn.active,.f-btn:hover{border-color:var(--purple);color:var(--purple);background:var(--purple-glow)}
.search-input{background:var(--bg);border:1px solid var(--border2);color:var(--white);padding:5px 12px;border-radius:20px;font-family:var(--sans);font-size:12px;outline:none;transition:border-color .2s;min-width:200px}
.search-input:focus{border-color:var(--purple)}
.search-input::placeholder{color:var(--muted)}
.topbar-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}

/* MEETING CARDS */
.meeting-list{display:flex;flex-direction:column;gap:10px}
.meeting-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color .2s}
.meeting-card:hover{border-color:var(--border2)}
.meeting-head{padding:14px 16px;display:flex;align-items:flex-start;gap:14px;cursor:pointer;flex-wrap:wrap}
.meeting-date{font-family:var(--mono);font-size:11px;color:var(--purple);flex-shrink:0;min-width:70px;margin-top:2px}
.meeting-title{flex:1;font-weight:700;font-size:14px;color:var(--white);min-width:140px}
.meeting-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:4px}
.owner-tag{font-family:var(--mono);font-size:10px;color:var(--purple);background:var(--purple-glow);border:1px solid var(--purple-dim);padding:2px 8px;border-radius:10px;white-space:nowrap}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-family:var(--mono);white-space:nowrap}
.badge-dot{width:5px;height:5px;border-radius:50%}
.badge-open{background:rgba(204,68,255,.12);color:var(--purple);border:1px solid var(--purple-dim)}.badge-open .badge-dot{background:var(--purple)}
.badge-done{background:rgba(51,204,119,.1);color:var(--green);border:1px solid rgba(51,204,119,.3)}.badge-done .badge-dot{background:var(--green)}
.badge-pending{background:rgba(255,170,51,.07);color:#ffcc77;border:1px solid rgba(255,170,51,.2)}.badge-pending .badge-dot{background:#ffcc77}
.toggle-btn{font-family:var(--mono);font-size:10px;color:var(--muted);margin-left:auto;flex-shrink:0;transition:transform .2s;display:inline-block;align-self:center}
.meeting-card.expanded .toggle-btn{transform:rotate(180deg);color:var(--purple)}
.meeting-body{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
.meeting-card.expanded .meeting-body{display:block}
.body-section{margin-top:14px}
.body-label{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);font-family:var(--mono);margin-bottom:6px}
.body-text{font-size:13px;color:var(--text);line-height:1.7;white-space:pre-wrap}
.body-text.empty{color:var(--muted);font-style:italic}

/* ACTION ITEMS */
.action-list{display:flex;flex-direction:column;gap:6px;margin-top:6px}
.action-item{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;background:var(--bg);border:1px solid var(--border2);border-radius:5px}
.action-check{width:16px;height:16px;border-radius:3px;border:1px solid var(--purple-dim);background:transparent;cursor:pointer;flex-shrink:0;margin-top:1px;appearance:none;-webkit-appearance:none;transition:all .15s}
.action-check:checked{background:var(--purple);border-color:var(--purple)}
.action-check:checked::after{content:'✓';display:block;color:#000;font-size:11px;font-weight:700;text-align:center;line-height:14px}
.action-text{flex:1;font-size:12px;color:var(--text);line-height:1.5}
.action-text.done{text-decoration:line-through;color:var(--muted)}
.action-owner{font-family:var(--mono);font-size:10px;color:var(--muted);white-space:nowrap;flex-shrink:0}

.card-actions{display:flex;gap:6px;margin-left:auto;flex-shrink:0}
.empty-state{text-align:center;padding:48px 20px;color:var(--muted);font-size:13px}
.empty-icon{font-size:30px;margin-bottom:8px;opacity:.3}

/* DASHBOARD CARDS */
.dash-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;padding:14px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.dc-date{font-family:var(--mono);font-size:11px;color:var(--purple);min-width:70px;flex-shrink:0}
.dc-title{flex:1;font-weight:700;font-size:13px;color:var(--white)}

.toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:10px 18px;font-size:12px;font-family:var(--mono);color:var(--white);z-index:999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--danger);color:var(--danger)}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:3px}
</style>
</head>
<body>
<header>
  <div class="logo">
    <svg width="26" height="26" viewBox="0 0 26 26" fill="none"><path d="M13 1.5L24 7.5V18.5L13 24.5L2 18.5V7.5L13 1.5Z" stroke="#cc44ff" stroke-width="1.5" fill="rgba(204,68,255,0.08)"/><circle cx="13" cy="13" r="3.5" fill="#cc44ff"/></svg>
    <div><div class="logo-name">OTHRAM</div><div class="logo-sub">Gov Coordination</div></div>
  </div>
  <span class="year-badge" id="yearBadge">2026</span>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('dashboard',this)">Dashboard</div>
  <div class="tab" onclick="switchTab('meetings',this)">All Meetings</div>
</div>

<main>
  <!-- DASHBOARD -->
  <div class="panel active" id="panel-dashboard">
    <div class="stats-bar" id="stats-bar"></div>
    <div class="section-label">Recent Meetings</div>
    <div id="dash-recent"></div>
    <div class="section-label" style="margin-top:28px">Open Action Items</div>
    <div id="dash-actions"></div>
  </div>

  <!-- ALL MEETINGS -->
  <div class="panel" id="panel-meetings">
    <div class="add-box">
      <div class="section-label">Log Meeting</div>
      <div class="form-row">
        <input class="f2" type="text" id="g-title" placeholder="Meeting title / subject">
        <input class="fxs" type="date" id="g-date">
        <select class="f1" id="g-status">
          <option value="Open">Open</option>
          <option value="Pending">Pending</option>
          <option value="Done">Done</option>
        </select>
      </div>
      <div class="form-row">
        <input class="f1" type="text" id="g-attendees" placeholder="Attendees (names or agencies)">
        <input class="f1" type="text" id="g-owner" placeholder="Owner / lead">
      </div>
      <div class="form-row">
        <div style="display:flex;flex-direction:column;gap:4px;flex:1">
          <span style="font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase">Meeting Notes</span>
          <textarea id="g-notes" placeholder="Key discussion points, decisions made, context..."></textarea>
        </div>
      </div>
      <div class="form-row">
        <div style="display:flex;flex-direction:column;gap:4px;flex:1">
          <span style="font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase">Action Items (one per line — format: "Task | Owner")</span>
          <textarea id="g-actions" placeholder="Follow up on funding | Maria&#10;Send briefing doc | James&#10;Schedule next meeting | Isa"></textarea>
        </div>
      </div>
      <div class="form-row">
        <button class="btn btn-primary" id="g-add-btn" onclick="addMeeting()">+ Log Meeting</button>
        <span id="g-edit-hint" style="display:none;font-family:var(--mono);font-size:11px;color:var(--warn);align-self:center">Editing — click Update to save</span>
        <button class="btn btn-outline" id="g-update-btn" style="display:none" onclick="updateMeeting()">✓ Update Meeting</button>
        <button class="btn-del" id="g-cancel-btn" style="display:none;font-size:13px;padding:6px 10px" onclick="cancelEdit()">Cancel</button>
      </div>
    </div>

    <div class="topbar-row">
      <div class="filters">
        <button class="f-btn active" onclick="setFilter('all',this)">All</button>
        <button class="f-btn" onclick="setFilter('Open',this)">Open</button>
        <button class="f-btn" onclick="setFilter('Pending',this)">Pending</button>
        <button class="f-btn" onclick="setFilter('Done',this)">Done</button>
        <input class="search-input" id="g-search" placeholder="Search meetings…" oninput="renderMeetings()">
      </div>
      <button class="btn btn-outline" onclick="exportCSV()">⬇ Export CSV</button>
    </div>

    <div class="section-label">Meeting Log</div>
    <div class="meeting-list" id="meeting-list"></div>
    <div class="empty-state" id="empty-state" style="display:none"><div class="empty-icon">📋</div>No meetings yet. Log one above.</div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyF7FFqZljb6FLROorY1Pfxr0cGtdt_9uI4F3YC4_LFUctNQOr-1e5mPkcFnhTwB2mV/exec';
var meetings = [];
var filter = 'all';
var editingId = null;

function save() {} // data saved via Google Sheets

function api(params, cb) {
  var name = 'cb_' + Date.now();
  var url = SCRIPT_URL + '?' + Object.keys(params).map(function(k){ return encodeURIComponent(k)+'='+encodeURIComponent(params[k]); }).join('&') + '&callback=' + name;
  var s = document.createElement('script');
  var t = setTimeout(function(){ delete window[name]; s.remove(); toast('Connection error','error'); cb(null); }, 12000);
  window[name] = function(data){ clearTimeout(t); delete window[name]; s.remove(); if(data&&data.error){ toast('Error: '+data.error,'error'); cb(null); return; } cb(data); };
  s.onerror = function(){ clearTimeout(t); delete window[name]; toast('Script error','error'); cb(null); };
  s.src = url;
  document.head.appendChild(s);
}

function loadMeetings() {
  api({action:'getAll'}, function(data){
    if (data && data.meetings) {
      meetings = data.meetings;
      renderMeetings();
      renderDashboard();
      toast('Loaded ' + meetings.length + ' meetings','success');
    }
  });
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }
function fmt(d) {
  if (!d) return '';
  var s = String(d);
  var MO = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  // Find any month name in the string e.g. "Apr 27 2026"
  for (var i = 0; i < MO.length; i++) {
    var pos = s.indexOf(MO[i]);
    if (pos > -1) {
      var rest = s.slice(pos + MO[i].length + 1).split(' ');
      var day = parseInt(rest[0]);
      var year = parseInt(rest[1]) || new Date().getFullYear();
      if (!isNaN(day)) return MO[i] + ' ' + day + ', ' + year;
    }
  }
  // Handle YYYY-MM-DD
  if (s.indexOf('-') > -1) {
    var p = s.split('-');
    if (p.length >= 3) return MO[parseInt(p[1])-1] + ' ' + parseInt(p[2]) + ', ' + p[0];
  }
  return s;
}
function toast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' '+type : '');
  setTimeout(function(){ el.className = 'toast'; }, 2500);
}
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
  el.classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
  if (name === 'dashboard') renderDashboard();
  if (name === 'meetings') renderMeetings();
}

function parseActions(text) {
  if (!text || !text.trim()) return [];
  return text.trim().split('\n').filter(function(l){ return l.trim(); }).map(function(l){
    var parts = l.split('|');
    return { id: uid(), task: (parts[0]||'').trim(), owner: (parts[1]||'').trim(), done: false };
  });
}

function getForm() {
  return {
    title:     document.getElementById('g-title').value.trim(),
    date:      document.getElementById('g-date').value,
    status:    document.getElementById('g-status').value,
    attendees: document.getElementById('g-attendees').value.trim(),
    owner:     document.getElementById('g-owner').value.trim(),
    notes:     document.getElementById('g-notes').value.trim(),
    actionsRaw:document.getElementById('g-actions').value.trim()
  };
}

function clearForm() {
  ['g-title','g-date','g-attendees','g-owner','g-notes','g-actions'].forEach(function(id){ document.getElementById(id).value=''; });
  document.getElementById('g-status').value = 'Open';
}

function addMeeting() {
  var f = getForm();
  if (!f.title) { toast('Please enter a meeting title','error'); return; }
  var m = { id: uid(), title: f.title, date: f.date, status: f.status, attendees: f.attendees, owner: f.owner, notes: f.notes, actions: parseActions(f.actionsRaw) };
  var btn = document.getElementById('g-add-btn');
  btn.textContent = 'Saving…'; btn.disabled = true;
  api({action:'add', meeting:JSON.stringify(m)}, function(data){
    btn.textContent = '+ Log Meeting'; btn.disabled = false;
    if (!data) return;
    meetings.unshift(data.meeting || m);
    clearForm(); renderMeetings(); renderDashboard();
    toast('Meeting logged!','success');
  });
}

function editMeeting(id) {
  var m = meetings.find(function(x){ return x.id===id; });
  if (!m) return;
  editingId = id;
  document.getElementById('g-title').value = m.title||'';
  document.getElementById('g-date').value = m.date||'';
  document.getElementById('g-status').value = m.status||'Open';
  document.getElementById('g-attendees').value = m.attendees||'';
  document.getElementById('g-owner').value = m.owner||'';
  document.getElementById('g-notes').value = m.notes||'';
  document.getElementById('g-actions').value = (m.actions||[]).map(function(a){ return a.task + (a.owner?' | '+a.owner:''); }).join('\n');
  document.getElementById('g-edit-hint').style.display = 'inline-flex';
  document.getElementById('g-update-btn').style.display = 'inline-block';
  document.getElementById('g-cancel-btn').style.display = 'inline-block';
  document.getElementById('g-add-btn').style.display = 'none';
  document.querySelector('.add-box').scrollIntoView({behavior:'smooth'});
}

function updateMeeting() {
  if (!editingId) return;
  var f = getForm();
  var m = { id: editingId, title: f.title, date: f.date, status: f.status, attendees: f.attendees, owner: f.owner, notes: f.notes, actions: parseActions(f.actionsRaw) };
  var btn = document.getElementById('g-update-btn');
  btn.textContent = 'Saving…'; btn.disabled = true;
  api({action:'update', meeting:JSON.stringify(m)}, function(data){
    btn.textContent = '✓ Update Meeting'; btn.disabled = false;
    if (!data) return;
    meetings = meetings.map(function(x){ return x.id===editingId?m:x; });
    cancelEdit(); renderMeetings(); renderDashboard();
    toast('Meeting updated!','success');
  });
}

function cancelEdit() {
  editingId = null; clearForm();
  document.getElementById('g-edit-hint').style.display = 'none';
  document.getElementById('g-update-btn').style.display = 'none';
  document.getElementById('g-cancel-btn').style.display = 'none';
  document.getElementById('g-add-btn').style.display = 'inline-block';
}

function delMeeting(id) {
  if (!confirm('Delete this meeting?')) return;
  api({action:'delete', id:id}, function(data){
    if (!data) return;
    meetings = meetings.filter(function(m){ return m.id!==id; });
    renderMeetings(); renderDashboard();
    toast('Meeting deleted');
  });
}

function toggleAction(meetingId, actionId) {
  var meeting = meetings.find(function(m){ return m.id===meetingId; });
  if (!meeting) return;
  meeting.actions = (meeting.actions||[]).map(function(a){ if(a.id===actionId) a.done=!a.done; return a; });
  api({action:'update', meeting:JSON.stringify(meeting)}, function(data){
    if (data) { renderMeetings(); renderDashboard(); }
  });
}

function statusBadge(s) {
  var map = {'Open':'open','Done':'done','Pending':'pending'};
  var cls = map[s]||'open';
  return '<span class="badge badge-'+cls+'"><span class="badge-dot"></span>'+esc(s)+'</span>';
}

function setFilter(f, el) {
  filter = f;
  document.querySelectorAll('.f-btn').forEach(function(b){ b.classList.remove('active'); });
  el.classList.add('active'); renderMeetings();
}

function filteredMeetings() {
  var q = (document.getElementById('g-search')?document.getElementById('g-search').value:'').toLowerCase();
  var list = meetings.slice();
  if (filter !== 'all') list = list.filter(function(m){ return m.status===filter; });
  if (q) list = list.filter(function(m){ return (m.title+m.attendees+m.owner+m.notes).toLowerCase().indexOf(q)>-1; });
  return list;
}

function renderMeetings() {
  var list = filteredMeetings();
  var el = document.getElementById('meeting-list');
  var empty = document.getElementById('empty-state');
  if (!list.length) { el.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display = 'none';
  el.innerHTML = list.map(function(m){
    var actions = (m.actions||[]);
    var doneCount = actions.filter(function(a){ return a.done; }).length;
    var actionHTML = actions.length ? actions.map(function(a){
      return '<div class="action-item">'
        +'<input type="checkbox" class="action-check" '+(a.done?'checked':'')+' onchange="toggleAction(\''+m.id+'\',\''+a.id+'\')">'
        +'<span class="action-text'+(a.done?' done':'')+'">'+esc(a.task)+'</span>'
        +(a.owner?'<span class="action-owner">'+esc(a.owner)+'</span>':'')
        +'</div>';
    }).join('') : '<span style="color:var(--muted);font-size:12px;font-style:italic">No action items.</span>';

    return '<div class="meeting-card" id="mc-'+m.id+'">'
      +'<div class="meeting-head" onclick="toggleCard(\''+m.id+'\')">'
        +'<div class="meeting-date">'+fmt(m.date)+'</div>'
        +'<div style="flex:1">'
          +'<div class="meeting-title">'+esc(m.title)+'</div>'
          +'<div class="meeting-meta">'
            +(m.owner?'<span class="owner-tag">'+esc(m.owner)+'</span>':'' )
            +statusBadge(m.status)
            +(actions.length?'<span style="font-family:var(--mono);font-size:10px;color:var(--muted)">'+doneCount+'/'+actions.length+' actions</span>':'')
          +'</div>'
        +'</div>'
        +'<div style="display:flex;gap:6px;align-items:center">'
          +'<button class="btn-del" onclick="event.stopPropagation();editMeeting(\''+m.id+'\')" style="font-size:13px">✏</button>'
          +'<button class="btn-del" onclick="event.stopPropagation();delMeeting(\''+m.id+'\')">✕</button>'
          +'<span class="toggle-btn">▼</span>'
        +'</div>'
      +'</div>'
      +'<div class="meeting-body">'
        +(m.attendees?'<div class="body-section"><div class="body-label">Attendees</div><div class="body-text">'+esc(m.attendees)+'</div></div>':'')
        +'<div class="body-section"><div class="body-label">Notes</div><div class="body-text'+(m.notes?'':' empty')+'">'+( m.notes?esc(m.notes):'No notes recorded.')+'</div></div>'
        +'<div class="body-section"><div class="body-label">Action Items</div><div class="action-list">'+actionHTML+'</div></div>'
      +'</div>'
      +'</div>';
  }).join('');
}

function toggleCard(id) {
  var el = document.getElementById('mc-'+id);
  if (el) el.classList.toggle('expanded');
}

function renderDashboard() {
  var total = meetings.length;
  var open = meetings.filter(function(m){ return m.status==='Open'; }).length;
  var allActions = meetings.reduce(function(acc,m){ return acc.concat(m.actions||[]); },[]);
  var openActions = allActions.filter(function(a){ return !a.done; }).length;

  document.getElementById('stats-bar').innerHTML =
    '<div class="stat"><div class="stat-num purple">'+total+'</div><div class="stat-label">Total Meetings</div></div>'
    +'<div class="stat"><div class="stat-num">'+open+'</div><div class="stat-label">Open Meetings</div></div>'
    +'<div class="stat"><div class="stat-num orange">'+openActions+'</div><div class="stat-label">Open Action Items</div></div>'
    +'<div class="stat"><div class="stat-num green">'+(allActions.length-openActions)+'</div><div class="stat-label">Completed Actions</div></div>';

  var recent = meetings.slice(0,5);
  var rEl = document.getElementById('dash-recent');
  rEl.innerHTML = !recent.length ? '<div class="empty-state"><div class="empty-icon">📋</div>No meetings logged yet.</div>' :
    recent.map(function(m){
      return '<div class="dash-card"><span class="dc-date">'+fmt(m.date)+'</span><span class="dc-title">'+esc(m.title)+'</span>'+(m.owner?'<span class="owner-tag">'+esc(m.owner)+'</span>':'')+statusBadge(m.status)+'</div>';
    }).join('');

  var openActs = [];
  meetings.forEach(function(m){
    (m.actions||[]).forEach(function(a){
      if (!a.done) openActs.push({meeting: m.title, task: a.task, owner: a.owner, mid: m.id, aid: a.id});
    });
  });
  var aEl = document.getElementById('dash-actions');
  aEl.innerHTML = !openActs.length ? '<div class="empty-state"><div class="empty-icon">✅</div>No open action items!</div>' :
    openActs.slice(0,8).map(function(a){
      return '<div class="dash-card">'
        +'<span class="dc-title">'+esc(a.task)+'</span>'
        +(a.owner?'<span class="owner-tag">'+esc(a.owner)+'</span>':'')
        +'<span style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-left:auto">'+esc(a.meeting)+'</span>'
        +'<input type="checkbox" class="action-check" onchange="toggleAction(\''+a.mid+'\',\''+a.aid+'\')" style="flex-shrink:0">'
        +'</div>';
    }).join('');
}

function exportCSV() {
  var rows = [];
  meetings.forEach(function(m){
    var base = [m.date, m.title, m.status, m.owner, m.attendees, m.notes.replace(/\n/g,' ')];
    if (!m.actions || !m.actions.length) {
      rows.push(base.concat(['','','']));
    } else {
      m.actions.forEach(function(a){
        rows.push(base.concat([a.task, a.owner, a.done?'Done':'Open']));
      });
    }
  });
  var headers = ['Date','Title','Status','Owner','Attendees','Notes','Action Item','Action Owner','Action Status'];
  var csv = [headers.join(',')].concat(rows.map(function(r){ return r.map(function(v){ return '"'+(v||'').replace(/"/g,'""')+'"'; }).join(','); })).join('\n');
  var a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download='meeting-tracker.csv'; a.click();
}

document.getElementById('yearBadge').textContent = new Date().getFullYear();
loadMeetings();
renderDashboard();
</script>
</body>
</html>
